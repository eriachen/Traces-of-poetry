version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: poetry-db
    environment:
      POSTGRES_DB: poetry_platform
      POSTGRES_USER: poetry
      POSTGRES_PASSWORD: poetry123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: poetry-backend
    environment:
      DATABASE_URL: postgresql://poetry:poetry123@postgres:5432/poetry_platform
      JWT_SECRET: your-jwt-secret-key-change-in-production
      PORT: 3001
    depends_on:
      - postgres
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: poetry-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres-data:
